<!DOCTYPE html>

<html lang="en">



<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laravel + MySQL Daily Cheat Sheet</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, Helvetica, sans-serif;
            background: #f5f7fa;
            color: #222;
        }

        .header {
            background: #fff;
            border-bottom: 1px solid #ddd;
            padding: 20px 30px;
            position: sticky;
            top: 0;
        }

        .header h1 {
            margin-bottom: 10px;
        }

        .search {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 14px;
        }

        .container {
            max-width: 1400px;
            margin: 20px auto;
            padding: 0 20px;
        }

        .category {
            margin-bottom: 40px;
        }

        .category-title {
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #333;
        }

        .command-card {
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 8px;
            margin-bottom: 15px;
            overflow: hidden;
        }

        .command-header {
            background: #fafafa;
            padding: 12px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #eee;
        }

        .command {
            font-family: Consolas, monospace;
            font-size: 14px;
            font-weight: bold;
        }

        .copy-btn {
            border: none;
            background: #2563eb;
            color: white;
            padding: 8px 12px;
            border-radius: 4px;
            cursor: pointer;
        }

        .copy-btn.copied {
            background: #16a34a;
        }

        .content {
            padding: 15px;
        }

        .label {
            font-weight: bold;
            margin-top: 10px;
            margin-bottom: 4px;
        }

        pre {
            background: #111827;
            color: #fff;
            padding: 10px;
            border-radius: 4px;
            overflow: auto;
            margin-top: 5px;
        }
    </style>

</head>

<body>

    <div class="header">
        <h1>Laravel + MySQL Daily Cheat Sheet</h1>

        ```
        <input type="text" id="search" class="search" placeholder="Search command, purpose, example...">
        ```

    </div>

    <div class="container" id="commands"></div>

    <script>

        const data = [

            {
                category: 'Laravel Artisan',
                items: [
                    {
                        command: 'php artisan serve',
                        purpose: 'Start local development server',
                        when: 'Beginning development',
                        example: 'http://127.0.0.1:8000',
                        related: 'php artisan route:list'
                    },
                    {
                        command: 'php artisan route:list',
                        purpose: 'Show all registered routes',
                        when: 'Debug routing issues',
                        example: 'GET /products ProductController@index',
                        related: 'routes/web.php'
                    },
                    {
                        command: 'php artisan tinker',
                        purpose: 'Open Laravel shell',
                        when: 'Test Eloquent quickly',
                        example: 'User::count();',
                        related: 'User::all();'
                    },
                    {
                        command: 'php artisan optimize:clear',
                        purpose: 'Clear all caches',
                        when: 'Laravel acting weird',
                        example: 'Clears config, route, view cache',
                        related: 'cache:clear'
                    },
                    {
                        command: 'php artisan cache:clear',
                        purpose: 'Clear application cache',
                        when: 'Cache issue',
                        example: 'php artisan cache:clear',
                        related: 'optimize:clear'
                    }
                ]
            },

            {
                category: 'Migration',
                items: [
                    {
                        command: 'php artisan migrate',
                        purpose: 'Run pending migrations',
                        when: 'After creating migration',
                        example: 'Create database tables',
                        related: 'migrate:fresh'
                    },
                    {
                        command: 'php artisan migrate:rollback',
                        purpose: 'Undo last migration batch',
                        when: 'Migration mistake',
                        example: 'Rollback latest changes',
                        related: 'migrate'
                    },
                    {
                        command: 'php artisan migrate:fresh',
                        purpose: 'Drop all tables and recreate',
                        when: 'Reset development database',
                        example: 'Deletes all data',
                        related: 'migrate:fresh --seed'
                    },
                    {
                        command: 'php artisan db:seed',
                        purpose: 'Run database seeders',
                        when: 'Populate fake data',
                        example: 'Create demo users',
                        related: 'migrate:fresh --seed'
                    }
                ]
            },

            {
                category: 'MySQL Tables',
                items: [
                    {
                        command: 'SHOW TABLES;',
                        purpose: 'Display all tables',
                        when: 'Forget table names',
                        example: 'users, products, orders',
                        related: 'DESCRIBE users;'
                    },
                    {
                        command: 'DESCRIBE users;',
                        purpose: 'Show table structure',
                        when: 'Need datatypes',
                        example: 'id bigint, name varchar(255)',
                        related: 'SHOW CREATE TABLE users;'
                    },
                    {
                        command: 'SHOW CREATE TABLE users;',
                        purpose: 'View complete SQL',
                        when: 'Debug indexes/constraints',
                        example: 'CREATE TABLE users (...)',
                        related: 'DESCRIBE users;'
                    }
                ]
            },

            {
                category: 'MySQL Data',
                items: [
                    {
                        command: 'SELECT * FROM users LIMIT 10;',
                        purpose: 'Preview records',
                        when: 'Inspect data',
                        example: 'First 10 users',
                        related: 'SELECT COUNT(*)'
                    },
                    {
                        command: 'SELECT COUNT(*) FROM users;',
                        purpose: 'Count rows',
                        when: 'Check totals',
                        example: '125',
                        related: 'SELECT * FROM users'
                    },
                    {
                        command: 'INSERT INTO users(name,email) VALUES("John","john@mail.com");',
                        purpose: 'Insert row',
                        when: 'Create record manually',
                        example: 'New user',
                        related: 'UPDATE users'
                    },
                    {
                        command: 'UPDATE users SET name="John" WHERE id=1;',
                        purpose: 'Update row',
                        when: 'Modify existing data',
                        example: 'Update user name',
                        related: 'DELETE FROM users'
                    },
                    {
                        command: 'DELETE FROM users WHERE id=1;',
                        purpose: 'Delete one row',
                        when: 'Remove specific record',
                        example: 'Delete user',
                        related: 'TRUNCATE TABLE users'
                    },
                    {
                        command: 'TRUNCATE TABLE users;',
                        purpose: 'Delete all rows',
                        when: 'Reset table data',
                        example: 'Table remains',
                        related: 'DROP TABLE users'
                    },
                    {
                        command: 'DROP TABLE users;',
                        purpose: 'Delete entire table',
                        when: 'Table no longer needed',
                        example: 'Table removed permanently',
                        related: 'TRUNCATE TABLE users'
                    }
                ]
            },

            {
                category: 'Eloquent',
                items: [
                    {
                        command: 'User::all();',
                        purpose: 'Get all users',
                        when: 'Retrieve records',
                        example: 'Collection<User>',
                        related: 'User::find()'
                    },
                    {
                        command: 'User::find(1);',
                        purpose: 'Find by primary key',
                        when: 'Need one row',
                        example: 'User object',
                        related: 'User::where()'
                    },
                    {
                        command: 'User::where("status",1)->get();',
                        purpose: 'Filter records',
                        when: 'Search data',
                        example: 'Active users',
                        related: 'User::first()'
                    },
                    {
                        command: 'User::create([...]);',
                        purpose: 'Insert record',
                        when: 'Create model',
                        example: 'New user',
                        related: 'save()'
                    }
                ]
            },

            {
                category: 'Composer',
                items: [
                    {
                        command: 'composer install',
                        purpose: 'Install dependencies',
                        when: 'Clone project',
                        example: 'vendor folder created',
                        related: 'composer update'
                    },
                    {
                        command: 'composer update',
                        purpose: 'Update packages',
                        when: 'Upgrade dependencies',
                        example: 'Latest versions',
                        related: 'composer install'
                    },
                    {
                        command: 'composer require laravel/sanctum',
                        purpose: 'Install package',
                        when: 'Need new package',
                        example: 'Adds dependency',
                        related: 'composer remove'
                    }
                ]
            }

        ];

        const container = document.getElementById('commands');

        function render(search = '') {

            container.innerHTML = '';

            data.forEach(group => {

                let html = '';

                group.items.forEach(item => {

                    const text = JSON.stringify(item).toLowerCase();

                    if (!text.includes(search.toLowerCase()))
                        return;

                    html += `
<div class="command-card">

<div class="command-header">
<div class="command">${item.command}</div>

<button
class="copy-btn"
onclick="copyCommand(this,\`${item.command.replace(/`/g, '')}\`)">
📋 Copy
</button>
</div>

<div class="content">

<div class="label">Purpose</div>
<div>${item.purpose}</div>

<div class="label">When to Use</div>
<div>${item.when}</div>

<div class="label">Example</div>
<pre>${item.example}</pre>

<div class="label">Related</div>
<div>${item.related}</div>

</div>

</div>
`;
                });

                if (html) {
                    container.innerHTML += `

<div class="category">
<h2 class="category-title">${group.category}</h2>
${html}
</div>
`;
                }

            });

        }

        function copyCommand(btn, text) {

            navigator.clipboard.writeText(text);

            btn.innerHTML = '✓ Copied';
            btn.classList.add('copied');

            setTimeout(() => {
                btn.innerHTML = '📋 Copy';
                btn.classList.remove('copied');
            }, 1000);
        }

        document
            .getElementById('search')
            .addEventListener('input', e => {
                render(e.target.value);
            });

        render();

    </script>

</body>

</html>
